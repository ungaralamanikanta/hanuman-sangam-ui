<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Hanuman Sangam</title>
  <link rel="stylesheet" href="css/register.css"/>
</head>
<body>

<div class="register-card">

  <!-- ── LEFT ──────────────────────────────────────────────── -->
  <div class="reg-left">
    <div class="logo-icon">🛕</div>
    <h2>Hanuman Sangam</h2>
    <p>Join our sacred community and be part of the Sangam family. जय श्री राम 🙏</p>
    <div class="steps">
      <div class="step-item">
        <div class="step-num">1</div>
        <div class="step-text">Fill your details</div>
      </div>
      <div class="step-item">
        <div class="step-num">2</div>
        <div class="step-text">Verify email with OTP</div>
      </div>
      <div class="step-item">
        <div class="step-num">3</div>
        <div class="step-text">Admin approves your account</div>
      </div>
      <div class="step-item">
        <div class="step-num">4</div>
        <div class="step-text">Login and access dashboard</div>
      </div>
    </div>
  </div>

  <!-- ── RIGHT ─────────────────────────────────────────────── -->
  <div class="reg-right">
    <h3>Create Account</h3>

    <div class="msg-box" id="msgBox"></div>

    <form id="registerForm" autocomplete="off" novalidate>

      <!-- NAME -->
      <div class="input-group">
        <label>Full Name</label>
        <div class="input-icon-wrap">
          <span class="icon">👤</span>
          <input type="text" id="name"
                 placeholder="Enter your full name"
                 pattern="[A-Za-z ]{3,}" required/>
        </div>
      </div>

      <!-- EMAIL -->
      <div class="input-group">
        <label>Email Address</label>
        <div class="input-icon-wrap">
          <span class="icon">📧</span>
          <input type="email" id="email"
                 placeholder="Enter your email" required/>
        </div>
      </div>

      <!-- MOBILE -->
      <div class="input-group">
        <label>Mobile Number</label>
        <div class="input-icon-wrap">
          <span class="icon">📱</span>
          <input type="tel" id="mobile"
                 placeholder="10-digit mobile number"
                 maxlength="10" inputmode="numeric" required/>
        </div>
      </div>

      <!-- OTP -->
      <div class="input-group">
        <label>OTP Verification</label>
        <div class="otp-row">
          <div class="input-icon-wrap">
            <span class="icon">🔢</span>
            <input type="text" id="otp"
                   placeholder="Enter 6-digit OTP"
                   maxlength="6" inputmode="numeric" required/>
          </div>
          <button type="button" id="otpBtn"
                  class="btn-send-otp" onclick="sendOTP()">
            Send OTP
          </button>
        </div>
      </div>

      <!-- PASSWORD -->
      <div class="input-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="password"
                 placeholder="Min 6 characters" minlength="6" required/>
          <span class="pw-toggle" onclick="togglePw()">🙈</span>
        </div>
      </div>

      <button type="submit" class="btn-register" id="regBtn">
        <span id="regBtnText">Create Account 🙏</span>
        <span class="spinner" id="spinner"></span>
      </button>

    </form>

    <p class="reg-footer">
      Already registered? <a href="login.html">Sign in here</a>
    </p>
  </div>

</div>

<div id="toast"></div>
<script src="js/api.js"></script>
<script src="js/common.js"></script>
<script src="js/register.js"></script>
</body>
</html>
